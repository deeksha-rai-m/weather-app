<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌤 Weather App</h1>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button onclick="getWeather()">Search</button>
        </div>

        <div class="weather-card" id="weatherResult">
            <h2 id="cityName">City Name</h2>
            <img id="weatherIcon" alt="weatherIcon"

            <div class="weather-info">
                <p><strong>🌡 Temperature:</strong> <span id="temperature">--</span></p>
                <p><strong>☁ Weather:</strong> <span id="description">--</span></p>
                <p><strong>💧 Humidity:</strong> <span id="humidity">--</span></p>
                <p><strong>🌬 Wind Speed:</strong> <span id="wind">--</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
